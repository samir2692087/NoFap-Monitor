<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NoFap Monitor Pro | Behavior Intelligence</title>
    <!-- jsPDF Library for Report Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #0984e3;
            --success: #00b894;
            --warning: #fdcb6e;
            --danger: #d63031;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #2d3436;
            --text-muted: #636e72;
            --border: #dfe6e9;
            --radius: 20px;
            --shadow: 0 12px 24px rgba(0,0,0,0.06);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #e0e0e0;
            --text-muted: #a0a0a0;
            --border: #333333;
            --shadow: 0 12px 30px rgba(0,0,0,0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 480px; padding: 20px; padding-bottom: 120px; }

        /* Focus Mode Styles */
        body.focus-mode .hide-focus { display: none !important; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .branding h1 { font-size: 1.4rem; margin: 0; font-weight: 800; }
        .branding span { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .streak-container { text-align: center; }
        .streak-val { font-size: 5.5rem; font-weight: 900; color: var(--primary); line-height: 1; margin: 10px 0; }
        .smart-feedback { font-size: 0.95rem; font-weight: 600; color: var(--success); margin-bottom: 15px; min-height: 1.2em; }

        button {
            border: none; border-radius: 14px; padding: 16px;
            font-weight: 700; cursor: pointer; width: 100%;
            transition: var(--transition); font-size: 1rem;
        }
        button:active { transform: scale(0.96); }
        .btn-checkin { background: var(--primary); color: white; margin-bottom: 12px; }
        .btn-checkin:disabled { background: var(--border); color: var(--text-muted); }
        .btn-relapse { background: transparent; color: var(--danger); border: 1.5px solid var(--danger); font-size: 0.85rem; }

        /* Report Button Specific */
        .btn-report { background: #6c5ce7; color: white; margin-top: 10px; }

        .insight-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .timeline { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .t-day { min-width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; background: var(--bg); color: var(--text-muted); }
        .t-success { background: var(--success); color: white; }
        .t-relapse { background: var(--danger); color: white; }

        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; pointer-events: none; }
        .toast { background: var(--text); color: var(--card); padding: 12px 24px; border-radius: 30px; font-weight: 700; margin-bottom: 10px; animation: toastIn 0.3s ease, toastOut 0.3s ease 2s forwards; }
        @keyframes toastIn { from { transform: translateY(-50px); opacity: 0; } }
        @keyframes toastOut { to { transform: translateY(-50px); opacity: 0; } }

        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); padding: 30px; border-radius: var(--radius); width: 100%; max-width: 400px; }
        
        .switch { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; font-weight: 600; }
        input[type="checkbox"] { width: 40px; height: 20px; appearance: none; background: var(--border); border-radius: 20px; position: relative; cursor: pointer; }
        input[type="checkbox"]:checked { background: var(--primary); }
        input[type="checkbox"]::before { content: ''; position: absolute; width: 16px; height: 16px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
        input[type="checkbox"]:checked::before { left: 22px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="container">
        <header>
            <div class="branding">
                <h1>NoFap Monitor <span>Pro</span></h1>
                <div id="streak-freeze-count" style="font-size: 0.7rem; color: var(--primary); font-weight: bold;">❄️ 0 Freezes Available</div>
            </div>
            <label class="switch">
                Focus Mode
                <input type="checkbox" id="focusToggle" onchange="toggleFocusMode()">
            </label>
        </header>

        <div class="card streak-container">
            <div id="smart-feedback" class="smart-feedback">Analyzing your progress...</div>
            <div class="streak-val" id="streak-display">0</div>
            <button class="btn-checkin" id="checkin-btn" onclick="handleCheckIn()">Mark Today Clean ✅</button>
            <button class="btn-relapse hide-focus" onclick="openRelapseModal()">I Relapsed</button>
        </div>

        <div class="card hide-focus">
            <div class="insight-row">
                <span>Discipline Score</span>
                <span id="stat-score" style="font-weight: 800; color: var(--primary);">0</span>
            </div>
            <div class="insight-row">
                <span>Current Level</span>
                <span id="stat-level" style="font-weight: 800; color: var(--success);">Beginner</span>
            </div>
        </div>

        <div class="card hide-focus" style="padding: 15px 24px;">
            <div style="font-size: 0.7rem; margin-bottom: 10px; color: var(--text-muted);">Streak History</div>
            <div class="timeline" id="timeline"></div>
        </div>

        <!-- Management Section with PDF Export -->
        <div class="card hide-focus">
            <div style="font-size: 0.7rem; margin-bottom: 15px; color: var(--text-muted);">Tools & Reports</div>
            <button class="btn-report" onclick="downloadPDF()">Download PDF Report 📄</button>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button style="background: var(--bg); color: var(--text); border: 1px solid var(--border); font-size: 0.8rem; padding: 10px;" onclick="exportData()">Backup JSON</button>
                <button style="background: var(--bg); color: var(--danger); border: 1px solid var(--border); font-size: 0.8rem; padding: 10px;" onclick="resetAllData()">Hard Reset</button>
            </div>
        </div>
    </div>

    <!-- Relapse Modal -->
    <div class="modal" id="relapse-modal">
        <div class="modal-content">
            <h3>Relapse Analysis</h3>
            <p style="font-size: 0.8rem; color: var(--text-muted);">What was the trigger?</p>
            <button class="btn-checkin" style="background: var(--bg); color: var(--text); margin-top: 10px;" onclick="submitRelapse('Stress')">Stress / Anxiety</button>
            <button class="btn-checkin" style="background: var(--bg); color: var(--text); margin-top: 5px;" onclick="submitRelapse('Boredom')">Boredom</button>
            <button class="btn-checkin" style="background: var(--bg); color: var(--text); margin-top: 5px;" onclick="submitRelapse('Social Media')">Social Media</button>
            <button class="btn-relapse" style="border:none; margin-top: 15px;" onclick="document.getElementById('relapse-modal').style.display='none'">Cancel</button>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;

        let state = {
            checkIns: [],
            relapses: [],
            freezesUsed: 0,
            settings: { focusMode: false },
            bestStreak: 0
        };

        const quotes = [
            "Self-discipline is the bridge between goals and accomplishment.",
            "The first and greatest victory is to conquer yourself.",
            "He who has a why to live can bear almost any how.",
            "Your future self is thanking you for not giving up."
        ];

        function init() {
            const saved = localStorage.getItem('NoFapMonitorPro_V3');
            if (saved) state = JSON.parse(saved);
            updateUI();
        }

        function save() { localStorage.setItem('NoFapMonitorPro_V3', JSON.stringify(state)); }

        function calculateStreak() {
            if (state.checkIns.length === 0) return 0;
            const sorted = [...new Set(state.checkIns)].sort().reverse();
            let streak = 0;
            let current = new Date(new Date().toISOString().split('T')[0]);

            if (sorted[0] !== new Date().toISOString().split('T')[0]) {
                current.setDate(current.getDate() - 1);
            }

            for (let i = 0; i < sorted.length; i++) {
                const date = new Date(sorted[i]);
                if ((current - date) / (1000 * 60 * 60 * 24) === 0) {
                    streak++;
                    current.setDate(current.getDate() - 1);
                } else break;
            }
            return streak;
        }

        function getLevel(streak) {
            if (streak >= 90) return "Monk Mode 🔥";
            if (streak >= 30) return "Strong Mind";
            if (streak >= 7) return "Rising Star";
            return "Beginner";
        }

        function handleCheckIn() {
            const today = new Date().toISOString().split('T')[0];
            if (!state.checkIns.includes(today)) {
                state.checkIns.push(today);
                showToast("Day marked clean! +10 Points");
                save();
                updateUI();
            }
        }

        function openRelapseModal() { document.getElementById('relapse-modal').style.display = 'flex'; }

        function submitRelapse(reason) {
            state.relapses.push({ date: new Date().toISOString().split('T')[0], reason: reason });
            const current = calculateStreak();
            if (current > (state.bestStreak || 0)) state.bestStreak = current;
            state.checkIns = [];
            document.getElementById('relapse-modal').style.display = 'none';
            showToast("Relapse recorded. Start again stronger.");
            save();
            updateUI();
        }

        function updateUI() {
            const streak = calculateStreak();
            if (streak > (state.bestStreak || 0)) state.bestStreak = streak;
            
            document.getElementById('streak-display').innerText = streak;
            document.getElementById('stat-level').innerText = getLevel(streak);
            
            const score = (streak * 5) + (state.checkIns.length * 2) - (state.relapses.length * 20);
            document.getElementById('stat-score').innerText = Math.max(0, score);
            
            const feedback = document.getElementById('smart-feedback');
            if (streak === 0) feedback.innerText = "Start strong. One clean day matters.";
            else if (streak < 7) feedback.innerText = "You're building control. Stay consistent.";
            else feedback.innerText = "You're in elite discipline zone 🔥";

            renderTimeline();
        }

        function renderTimeline() {
            const container = document.getElementById('timeline');
            container.innerHTML = '';
            for (let i = 10; i >= 0; i--) {
                const d = new Date(); d.setDate(d.getDate() - i);
                const dStr = d.toISOString().split('T')[0];
                const day = document.createElement('div');
                day.className = 't-day ' + (state.checkIns.includes(dStr) ? 't-success' : '');
                if (state.relapses.some(r => r.date === dStr)) day.classList.add('t-relapse');
                day.innerText = d.getDate();
                container.appendChild(day);
            }
        }

        /* --- PDF GENERATION LOGIC --- */
        function downloadPDF() {
            const doc = new jsPDF();
            const streak = calculateStreak();
            const score = Math.max(0, (streak * 5) + (state.checkIns.length * 2) - (state.relapses.length * 20));
            const level = getLevel(streak);
            const quote = quotes[Math.floor(Math.random() * quotes.length)];

            // Header
            doc.setFont("helvetica", "bold");
            doc.setFontSize(22);
            doc.setTextColor(9, 132, 227); // Primary Blue
            doc.text("NoFap Monitor Report", 105, 30, { align: "center" });

            // Divider
            doc.setDrawColor(223, 230, 233);
            doc.line(20, 40, 190, 40);

            // Level Banner
            doc.setFontSize(14);
            doc.setTextColor(0, 184, 148); // Success Green
            doc.text(`Current Rank: ${level}`, 105, 55, { align: "center" });

            // Stats Section
            doc.setTextColor(45, 52, 54); // Text Gray
            doc.setFontSize(12);
            doc.setFont("helvetica", "normal");
            
            const startY = 75;
            const lineSpacing = 12;

            doc.text(`Current Streak:`, 40, startY);
            doc.setFont("helvetica", "bold");
            doc.text(`${streak} Days`, 140, startY);

            doc.setFont("helvetica", "normal");
            doc.text(`Best Streak:`, 40, startY + lineSpacing);
            doc.setFont("helvetica", "bold");
            doc.text(`${state.bestStreak || streak} Days`, 140, startY + lineSpacing);

            doc.setFont("helvetica", "normal");
            doc.text(`Total Relapses:`, 40, startY + (lineSpacing * 2));
            doc.setFont("helvetica", "bold");
            doc.text(`${state.relapses.length}`, 140, startY + (lineSpacing * 2));

            doc.setFont("helvetica", "normal");
            doc.text(`Check-ins (Total Clean Days):`, 40, startY + (lineSpacing * 3));
            doc.setFont("helvetica", "bold");
            doc.text(`${state.checkIns.length}`, 140, startY + (lineSpacing * 3));

            doc.setFont("helvetica", "normal");
            doc.text(`Discipline Score:`, 40, startY + (lineSpacing * 4));
            doc.setFont("helvetica", "bold");
            doc.text(`${score}`, 140, startY + (lineSpacing * 4));

            // Motivation Box
            doc.setDrawColor(9, 132, 227);
            doc.setLineWidth(0.5);
            doc.rect(20, 160, 170, 30);
            doc.setFont("helvetica", "italic");
            doc.setFontSize(10);
            doc.text(`"${quote}"`, 105, 177, { align: "center", maxWidth: 150 });

            // Footer
            doc.setFont("helvetica", "normal");
            doc.setFontSize(8);
            doc.setTextColor(99, 110, 114);
            doc.text(`Generated on ${new Date().toLocaleString()}`, 105, 280, { align: "center" });

            // Download
            doc.save("NoFap_Report.pdf");
            showToast("PDF Downloaded 📄");
        }

        function toggleFocusMode() {
            state.settings.focusMode = document.getElementById('focusToggle').checked;
            document.body.classList.toggle('focus-mode', state.settings.focusMode);
            save();
        }

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 2300);
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(state)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'nofap_backup.json';
            a.click();
        }

        function resetAllData() {
            if(confirm("Erase all data?")) {
                localStorage.removeItem('NoFapMonitorPro_V3');
                location.reload();
            }
        }

        init();
    </script>
</body>
</html>
